<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>I Love You Baraah</title>
  <style>
    :root{
      --layer-h:55px;      
      --overlap:15px;     
      --delta: calc(var(--layer-h) - var(--overlap));
    }
    body{
      margin:0;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(circle at 20% 10%, #fff3f8 0%, #ffd6e8 25%, #ffc7d4 70%);
      font-family: 'Segoe UI', sans-serif;
      overflow:hidden;
    }

    .stage{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}

    .bubbles-layer{position:absolute;left:0;right:0;bottom:10vh;height:60vh;pointer-events:none;z-index:1}

    .cake{
      position:relative;
      width:280px;
      height:240px;
      z-index:3;
    }

    .layer{
      position:absolute;
      left:50%;
      transform:translateX(-50%) translateY(20px);
      height: var(--layer-h);
      border-radius:14px;
      background:#8b4d36;
      box-shadow: inset 0 -6px 8px rgba(0,0,0,.2);
      opacity:0;
      transition: all 700ms cubic-bezier(.2,.9,.3,1);
    }
    .layer.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    #layer1 { width:260px; bottom:0; }
    #layer2 { width:220px; bottom:calc(var(--delta) * 1); }
    #layer3 { width:180px; bottom:calc(var(--delta) * 2); }

    /* كريمة سايحة ولازقة في الطبقة الثالثة */
    .icing{
      position:absolute;
      left:50%;
      transform:translateX(-50%) translateY(0);
      width:200px; height:40px;
      bottom:calc(var(--delta) * 2 + var(--layer-h) - 8px);
      background:white;
      border-radius:20px;
      box-shadow: inset 0 -4px 6px rgba(0,0,0,.1);
      opacity:0;
      transition:all 700ms cubic-bezier(.2,.9,.3,1);
      clip-path: polygon(0 0,100% 0,100% 70%,85% 100%,70% 75%,50% 100%,30% 75%,15% 100%,0 70%);
    }
    .icing.show{ opacity:1; }

    .candle{
      position:absolute;
      left:50%;
      transform:translateX(-50%) translateY(0);
      width:16px; height:50px; border-radius:8px;
      background:linear-gradient(180deg,#ffd28a,#ffb347);
      box-shadow:0 4px 8px rgba(0,0,0,.2);
      /* 👇 نزلنا الشمعة تلامس الكريمة */
      bottom:calc(var(--delta) * 2 + var(--layer-h) + 22px);
      opacity:0; transition: all 600ms ease;
    }
    .candle.show{opacity:1;}

    .wick{
      position:absolute; top:-8px; left:50%;
      transform:translateX(-50%);
      width:2px; height:8px; background:#3a2014; border-radius:2px;
    }

    .flame{
      position:absolute;
      top:-26px; left:50%;
      transform:translateX(-50%) scale(.9);
      width:18px; height:24px;
      border-radius:50% 50% 40% 40%;
      background: radial-gradient(circle at 50% 35%, #fff176 0%, #ffb74d 40%, #ff7043 70%);
      opacity:0;
      transition:opacity .3s ease, transform .3s ease;
      filter:drop-shadow(0 0 12px rgba(255,140,60,0.6));
    }
    .flame.lit{
      opacity:1;
      transform:translateX(-50%) scale(1);
      animation:flicker .18s infinite alternate;
    }
    @keyframes flicker{
      from{transform:translateX(-50%) scale(1)}
      to{transform:translateX(-50%) scale(1.08) rotate(2deg)}
    }

    .message{
      position:absolute;
      top: 86%;
      left:50%;
      transform:translateX(-50%) translateY(12px);
      width:100%;
      text-align:center;
      font-weight:700;
      font-size:clamp(18px,2.2vw,28px);
      color:#c2185b;
      text-shadow:2px 2px 6px rgba(255,255,255,.7);
      opacity:0;
      transition:all 800ms ease;
      pointer-events:none;
    }
    .message.show{opacity:1; transform:translateX(-50%) translateY(0)}

    /* بابلز */
    .bubble{
      position:absolute;
      padding:6px 12px;
      border-radius:999px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(2px);
      font-weight:700;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
      white-space:nowrap;
    }
    @keyframes riseUp{ 
      0%{ transform:translateY(0) scale(1); opacity:1 }
      100%{ transform:translateY(-28vh) scale(1.12); opacity:0 } 
    }

    /* كونفيتي */
    .confetti{ position:absolute; width:8px; height:8px; border-radius:2px; opacity:.95; z-index:0; }

    /* نجوم */
    .star{ position:absolute; width:3px; height:3px; background:#fff; border-radius:50%; opacity:.85;
      filter:drop-shadow(0 0 4px rgba(255,255,255,.6)); animation: twinkle 2.2s infinite ease-in-out; }
    @keyframes twinkle{0%,100%{opacity:.25; transform:scale(1)} 50%{opacity:1; transform:scale(1.6)}}
  </style>
</head>
<body>
  <div class="stage">
    <div class="bubbles-layer" id="bubblesLayer"></div>
    <div class="cake" id="cake">
      <div class="layer" id="layer1"></div>
      <div class="layer" id="layer2"></div>
      <div class="layer" id="layer3"></div>
      <div class="icing" id="icing"></div>
      <div class="candle" id="candle">
        <div class="wick"></div>
        <div class="flame" id="flame"></div>
      </div>
    </div>
    <div class="message" id="message">I Love you, The Most Beautiful Baraah in the World  💖</div>
  </div>

  <script>
    const layer1=document.getElementById('layer1');
    const layer2=document.getElementById('layer2');
    const layer3=document.getElementById('layer3');
    const icing=document.getElementById('icing');
    const candle=document.getElementById('candle');
    const flame=document.getElementById('flame');
    const message=document.getElementById('message');
    const bubblesLayer=document.getElementById('bubblesLayer');
    const cake=document.getElementById('cake');

    const start=1000, step=2500;
    const times=[ start, start+step, start+2*step, start+3*step, start+4*step, start+5*step ];

    setTimeout(()=>layer1.classList.add('show'), times[0]);
    setTimeout(()=>layer2.classList.add('show'), times[1]);
    setTimeout(()=>layer3.classList.add('show'), times[2]);
    setTimeout(()=>icing.classList.add('show'), times[3]);
    setTimeout(()=>candle.classList.add('show'), times[4]);
    setTimeout(()=>{ flame.classList.add('lit'); message.classList.add('show'); }, times[5]);

    const bubbleTexts=['اغلي صديقة في الكون❤️','انت سر سعادتي وبهجتي🌸','انت اجمل هدية في حياتي💫','عيونك بتسحرني🎉','حياتي اجمل بيكي  🌹','انت اجمل واروع بنوته في العالم  ✨','وجودك يسوي العالم 😍','😍انت قمري الصغير','احبك يا برءوءتي️️❤️'];
    function createBubble(){
      const b=document.createElement('div');
      b.className='bubble';
      b.textContent=bubbleTexts[Math.floor(Math.random()*bubbleTexts.length)];
      const cakeRect=cake.getBoundingClientRect();
      const stageRect=document.body.getBoundingClientRect();
      const minX=Math.max(8,cakeRect.left-stageRect.left-30);
      const maxX=Math.min(stageRect.width-8,cakeRect.right-stageRect.left+30);
      const x=Math.floor(Math.random()*(maxX-minX))+minX;
      b.style.left=x+'px';
      const startY=(cakeRect.top-stageRect.top)+cakeRect.height*0.55;
      b.style.top=startY+'px';
      const dur=(4+Math.random()*3).toFixed(2);
      b.style.fontSize=(14+Math.random()*4)+'px';
      b.style.animation=`riseUp ${dur}s linear forwards`;
      bubblesLayer.appendChild(b);
      setTimeout(()=>b.remove(), dur*1000+300);
    }
    let bubbleInterval;
    setTimeout(()=>{ createBubble(); bubbleInterval=setInterval(createBubble, 1100); }, start+600);

    function createConfettiDot(){
      const dot=document.createElement('div');
      dot.className='confetti';
      const hue=Math.floor(Math.random()*360);
      dot.style.background=`hsl(${hue},80%,65%)`;
      dot.style.left=Math.random()*100+'vw';
      dot.style.top=Math.random()*40+'vh';
      dot.style.transform=`rotate(${Math.random()*360}deg)`;
      document.body.appendChild(dot);
      setTimeout(()=>dot.remove(), 5000+Math.random()*3000);
    }
    for(let i=0;i<30;i++){ setTimeout(createConfettiDot,i*150); }

    function createStar(){
      const s=document.createElement('div');
      s.className='star';
      s.style.left=Math.random()*100+'vw';
      s.style.top=Math.random()*50+'vh';
      s.style.animationDelay=(Math.random()*2)+'s';
      document.body.appendChild(s);
      setTimeout(()=>s.remove(),12000+Math.random()*6000);
    }
    for(let i=0;i<40;i++){ setTimeout(createStar,i*100); }

    setTimeout(()=>{ clearInterval(bubbleInterval); }, times[5]+22000);
  </script>
</body>
</html>
