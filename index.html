<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>رحمة</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cairo',sans-serif;
    }

    body{
      background:#050816;
      overflow:hidden;
      color:white;
    }

    canvas{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:-1;
    }

    .container{
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      position:relative;
    }

    .scene{
      display:none;
      max-width:800px;
      animation:fade 1.5s ease;
    }

    .active{
      display:block;
    }

    h1{
      font-size:70px;
      color:#fff;
      text-shadow:
      0 0 10px #6ea8fe,
      0 0 20px #6ea8fe,
      0 0 40px #6ea8fe;
      margin-bottom:25px;
    }

    p{
      font-size:28px;
      line-height:2;
      color:#e5e7eb;
      min-height:120px;
    }

    button{
      margin-top:40px;
      padding:15px 35px;
      border:none;
      border-radius:40px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(10px);
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:.4s;
      border:1px solid rgba(255,255,255,.15);
      box-shadow:0 0 15px rgba(110,168,254,.3);
    }

    button:hover{
      transform:scale(1.07);
      background:#6ea8fe;
      box-shadow:0 0 25px #6ea8fe;
    }

    .heart{
      font-size:90px;
      animation:pulse 2s infinite;
      margin-bottom:20px;
      text-shadow:0 0 25px #fff;
    }

    .secretBox{
      display:none;
      margin-top:35px;
      padding:30px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      border-radius:25px;
      backdrop-filter:blur(15px);
      animation:fade 1s ease;
    }

    .secretBox p{
      font-size:24px;
      line-height:2;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes pulse{
      0%{
        transform:scale(1);
      }
      50%{
        transform:scale(1.08);
      }
      100%{
        transform:scale(1);
      }
    }

    @media(max-width:768px){

      h1{
        font-size:50px;
      }

      p{
        font-size:22px;
      }

      button{
        font-size:18px;
      }
    }

  </style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">

  <!-- المشهد الأول -->
  <div class="scene active">
    <h1>رحمة</h1>

    <p id="text1"></p>

    <button onclick="nextScene(1)">
      كملي الرحلة
    </button>
  </div>

  <!-- المشهد الثاني -->
  <div class="scene">
    <p id="text2"></p>

    <button onclick="nextScene(2)">
      بعدين؟
    </button>
  </div>

  <!-- المشهد الثالث -->
  <div class="scene">
    <p id="text3"></p>

    <button onclick="nextScene(3)">
      كملي
    </button>
  </div>

  <!-- المشهد الرابع -->
  <div class="scene">
    <div class="heart">🤍</div>

    <p id="text4"></p>

    <button onclick="showSecret()">
      رسالة مخفية
    </button>

    <div class="secretBox" id="secretBox">
      <p>
        يمكن عشان إنتِ مش شبه حد...<br><br>

        فالكلام العادي مش بيعرف يوصفك.<br><br>

        بس الحقيقة الوحيدة اللي متأكد منها،<br>
        إنك من الناس اللي وجودهم بيغير الإحساس بكل حاجة حواليهم.<br><br>

        ومهما قابلت ناس كتير...<br>
        هيفضل في جزء جوايا رابط الراحة والهدوء بوجودك إنتِ تحديدًا.
      </p>
    </div>

  </div>

</div>

<script>

  // النجوم

  const canvas = document.getElementById("stars");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let stars = [];

  for(let i=0;i<200;i++){
    stars.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*2,
      d:Math.random()*1
    });
  }

  function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="white";

    stars.forEach(star=>{
      ctx.beginPath();
      ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
      ctx.fill();

      star.y += star.d;

      if(star.y > canvas.height){
        star.y = 0;
      }
    });

    requestAnimationFrame(drawStars);
  }

  drawStars();

  // الانتقال بين المشاهد

  const scenes = document.querySelectorAll(".scene");

  function nextScene(index){

    scenes[index-1].classList.remove("active");
    scenes[index].classList.add("active");
  }

  // الكتابة التدريجية

  function typeWriter(element,text,speed=50){

    let i = 0;

    function typing(){

      if(i < text.length){

        element.innerHTML += text.charAt(i);
        i++;

        setTimeout(typing,speed);
      }
    }

    typing();
  }

  typeWriter(
    document.getElementById("text1"),
    "في وسط زحمة الأيام... ومواقف كتير بتتلخبط وتتنسى... بيفضل في حاجات معينة مستحيل تتمحي."
  );

  setTimeout(()=>{
    typeWriter(
      document.getElementById("text2"),
      "أنا ممكن أكون مش فاكر إمتى بالظبط أول مرة اتكلمنا... ولا مجمع كل تفاصيل البداية... بس أنا متأكد إن صدفة لعبة الدخلاء كانت من أحلى الاستثناءات في حياتي."
    );
  },1000);

  setTimeout(()=>{
    typeWriter(
      document.getElementById("text3"),
      "الأيام أثبتتلي إن قيمة بعض الناس مش بتتقاس بالوقت... قيمتك في الراحة اللي بحسها معاكي... إنتي مش مجرد صاحبة... إنتي أجمل وأجدع صديقة الواحد محظوظ إنه عرفها."
    );
  },2000);

  setTimeout(()=>{
    typeWriter(
      document.getElementById("text4"),
      "في ناس وجودها بيبقى عابر... وفي ناس وجودها بيبقى غالي جدًا وبيدخل القلب... وإنتِ غالية جدًا."
    );
  },3000);

  // الرسالة السرية

  function showSecret(){

    document.getElementById("secretBox").style.display="block";
  }

</script>

</body>
</html>
